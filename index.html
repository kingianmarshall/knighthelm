function isWall(x,y){

	x=Math.floor(x);
	y=Math.floor(y);
	if(map[y][x]==1)return true;

	if(map[y][x]==7)return true;
	if(map[y][x]==8)return true;
	if(map[y][x]==9)return true;
	
	
	return false;
}

function tick(){
	now=performance.now();
	elapsedTime=(now-past)/1000;
	past=now;
	if(shift && stamina>0){
	
	speed=10;
	stamina-=20*elapsedTime;
	if(stamina<0)stamina=0;
	}else if(!shift){
		speed=5;
		stamina+=15*elapsedTime;
		if(stamina>=100)stamina=100;
	}
	
	if(space)swing+=5*elapsedTime;
	else swing=-Math.PI/8;
	if(swing>Math.PI/8)swing=Math.PI/8;
	
	
	if(wP){
		px-=Math.sin(pa)*speed*elapsedTime;
		py-=Math.cos(pa)*speed*elapsedTime;
		if(walls[Math.floor(py)][Math.floor(px)]>0){
			px+=Math.sin(pa)*speed*elapsedTime;
			py+=Math.cos(pa)*speed*elapsedTime;
		}
		pickup();
	}
	if(sP){
		px+=Math.sin(pa)*speed*elapsedTime;
		py+=Math.cos(pa)*speed*elapsedTime;
		if(walls[Math.floor(py)][Math.floor(px)]>0){
			px-=Math.sin(pa)*speed*elapsedTime;
			py-=Math.cos(pa)*speed*elapsedTime;
		}
		pickup();
	}
	if(dP)pa-=elapsedTime;
	if(aP)pa+=elapsedTime;
	if(pa>Math.PI*2)pa-=Math.PI*2;
	if(pa<0)pa+=Math.PI*2;
	
	for(let z=0;z<zombies.length;z++){
	
	let lastX=zombies[z].x;
	let lastY=zombies[z].y;
	
	
		zombies[z].counter++;
		let distance=Math.sqrt((zombies[z].x-px)*(zombies[z].x-px)+(zombies[z].y-py)*(zombies[z].y-py));
		if(distance<10 && distance>1){
		zombies[z].moan.volume=1-distance/12;
		zombies[z].moan.play();
		if(zombies[z].x!=px){
		if(zombies[z].x<px){
		zombies[z].x+=zombies[z].speed*elapsedTime;
		
		if(walls[Math.floor(zombies[z].y)][Math.floor(zombies[z].x)]>0 && walls[Math.floor(zombies[z].y)][Math.floor(zombies[z].x)]!=zombies[z].id){
			zombies[z].x-=zombies[z].speed*elapsedTime;
			
		}
		
		}
		if(zombies[z].x>px){
		zombies[z].x-=zombies[z].speed*elapsedTime;
		
		if(walls[Math.floor(zombies[z].y)][Math.floor(zombies[z].x)]>0 && walls[Math.floor(zombies[z].y)][Math.floor(zombies[z].x)]!=zombies[z].id){
			zombies[z].x+=zombies[z].speed*elapsedTime;
			
		}
		
		}
		}
		
		if(zombies[z].y!=py){
		if(zombies[z].y>py){
		zombies[z].y-=zombies[z].speed*elapsedTime;
		
		if(walls[Math.floor(zombies[z].y)][Math.floor(zombies[z].x)]>0 && walls[Math.floor(zombies[z].y)][Math.floor(zombies[z].x)]!=zombies[z].id){
			zombies[z].y+=zombies[z].speed*elapsedTime;
			
		}
		
		}
		if(zombies[z].y<py){
		zombies[z].y+=zombies[z].speed*elapsedTime;
		
		if(walls[Math.floor(zombies[z].y)][Math.floor(zombies[z].x)]>0 && walls[Math.floor(zombies[z].y)][Math.floor(zombies[z].x)]!=zombies[z].id){
			zombies[z].y-=zombies[z].speed*elapsedTime;
			
		}
		
		}
		}
		
		}else if(distance<=1){
			hp-=20*elapsedTime;
			if(hp<0)hp=0;
			if(hp==0)dead=true;
		}
		if(Math.floor(lastX)!=Math.floor(zombies[z].x) || Math.floor(lastY)!=Math.floor(zombies[z].y)){
		walls[Math.floor(lastY)][Math.floor(lastX)]=0;
		walls[Math.floor(zombies[z].y)][Math.floor(zombies[z].x)]=zombies[z].id;
		}
	}
}
function draw(frame){

b.reset();
b.translate(250,500);
b.rotate(pa);
let sx=Math.floor(px-12);
	let ex=Math.floor(px+12);
	let sy=Math.floor(py-12);
	let ey=Math.floor(py+12);
if(pa<Math.PI/2){
	sx=Math.floor(px-12);
	ex=Math.floor(px+12);
	sy=Math.floor(py-12);
	ey=Math.floor(py+12);
}else if(pa<Math.PI){
	sx=Math.floor(px-12);
	ex=Math.floor(px+12);
	sy=Math.floor(py+12);
	ey=Math.floor(py-12);
}else if(pa<Math.PI*1.5){
	sx=Math.floor(px+12);

		sP=true;
		frm=1;
		walksound.volume=1;
		walksound.playbackRate=1.5;
		walksound.play();
		walksound2.volume=1;
		walksound2.playbackRate=1.5;
		walksound2.play();
		walksound3.volume=1;
		walksound3.playbackRate=1.5;
		walksound3.play();
	}
	if(key=='d' || key=='D')dP=true;
	
});
document.addEventListener("keyup",(e)=>{
	let key=e.key;
	shift=e.shiftKey;
	walksound.playbackRate=1.5;
	walksound2.playbackRate=1.5;
	walksound3.playbackRate=1.5;
	if(key=='w' || key=='W'){
		wP=false;
		frm=0;
		
		walksound.pause();
		walksound.currentTime=0;
		walksound2.pause();
		walksound2.currentTime=0;
		walksound3.pause();
		walksound3.currentTime=0;
	}
	if(key=='a' || key=='A')aP=false;
	if(key=='s' || key=='S'){
		sP=false;
		frm=0;
		
		walksound.pause();
		walksound.currentTime=0;
		walksound2.pause();
		walksound2.currentTime=0;
		walksound3.pause();
		walksound3.currentTime=0;
	}
	if(key=='d' || key=='D')dP=false;
	
});
document.addEventListener("mousedown",(e)=>{
	if(e.button==0)space=true;
	running=true;
	theme.play();
	rainsound.volume=0.3;
	rainsound.play();

});
document.addEventListener("mouseup",(e)=>{

	if(e.button==0)space=false;

});
document.addEventListener("mousemove",(e)=>{

});
</script>
